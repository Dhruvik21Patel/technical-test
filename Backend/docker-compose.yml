version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: productmanagement-postgres
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Kolkata

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - productmanagement-network


  productmanagement.api:
    container_name: productmanagement-api

    image: ${DOCKER_REGISTRY-}productmanagement-api
    #image: ghcr.io/${GITHUB_REPOSITORY}/productmanagement-api:${IMAGE_TAG}

    build:
      context: .
      dockerfile: ProductManagement.API/Dockerfile

    depends_on:
      - pgadmin

    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION}

    ports:
      - "5000:80"

    networks:
      - productmanagement-network


  client:
    container_name: productmanagement-frontend
    
    image: ${DOCKER_REGISTRY-}productmanagement-fronted
    #image: ghcr.io/${GITHUB_REPOSITORY}/productmanagement-frontend:${IMAGE_TAG}


    build:
      context: ../frontend
      dockerfile: Dockerfile

    ports:
      - "5173:80"

    depends_on:
      - productmanagement.api

    networks:
      - productmanagement-network


volumes:
  postgres_data:


networks:
  productmanagement-network: